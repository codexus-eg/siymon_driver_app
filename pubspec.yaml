name: siymon_driver_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  flutter_inappwebview: ^6.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - web/assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/assets/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "web/assets/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "web/assets/logo.png"
  android_12:
    color: "#ffffff"
    image: "web/assets/logo.png"

name: iOS Build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # الخطوة الجديدة: تغليف التطبيق كملف IPA داخل الماك نفسه
      - name: Package IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r -9 siymon.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: siymon-app-release
          path: siymon.ipa
